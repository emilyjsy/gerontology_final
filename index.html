<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노년학 기말고사 포털 | 로비</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
            --accent: #52b788;
            --bg: #f0faf3;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: var(--primary-green);
            color: white;
            padding: 50px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 2.5rem; letter-spacing: -1px; }
        .subtitle { opacity: 0.9; margin-top: 10px; font-weight: 300; }

        .main-container {
            max-width: 900px;
            width: 90%;
            margin-top: -40px;
        }

        /* 챕터 카드 리스트 */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .chapter-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #e0e0e0;
        }

        .chapter-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }

        .ch-number {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .ch-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a3a2a;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        /* 이동 버튼 */
        .btn-enter {
            background: var(--primary-green);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            transition: background 0.2s;
        }

        .btn-enter:hover {
            background: var(--accent);
        }

        /* 준비중인 카드 */
        .pending {
            opacity: 0.6;
            background: #f9f9f9;
        }
        .status-tag {
            display: inline-block;
            background: #eee;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #777;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>GERONTOLOGY PORTAL</h1>
    <p class="subtitle">노년학 기말고사 완벽 대비를 위한 학습 로비</p>
</header>

<div class="main-container">
    <div class="chapter-grid">
        
        <div class="chapter-card">
            <div>
                <div class="ch-number">CHAPTER 08</div>
                <div class="ch-title">사회적 노화 Ⅰ (세대 및 친족관계)</div>
                <p style="font-size: 0.9rem; color: #666;">콩깍지형 가족, 세대 간 결속도, 양가성 모델 등 핵심 이론 정리</p>
            </div>
            <a href="gerontology_ch08_study.html" class="btn-enter">학습 시작하기 →</a>
        </div>

        <div class="chapter-card pending">
            <div>
                <div class="ch-number">CHAPTER 09</div>
                <div class="ch-title">사회적 노화 Ⅱ (퇴직 및 사회활동)</div>
                <span class="status-tag">자료 정리 중...</span>
            </div>
            <a href="#" class="btn-enter" style="background: #ccc; cursor: default;">잠겨있음</a>
        </div>

        <div class="chapter-card pending">
            <div>
                <div class="ch-number">CHAPTER 10</div>
                <div class="ch-title">노인복지정책 및 산업</div>
                <span class="status-tag">자료 정리 중...</span>
            </div>
            <a href="#" class="btn-enter" style="background: #ccc; cursor: default;">잠겨있음</a>
        </div>

    </div>
</div>

<footer>
    © 2026 Gerontology Exam Study Portal
</footer>

</body>
</html>
